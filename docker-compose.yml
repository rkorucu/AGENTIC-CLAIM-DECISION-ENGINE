services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      AGENT_SERVICE_URL: http://agent-service:8000
    depends_on:
      - agent-service

  agent-service:
    build: ./agent-service
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:80"
    depends_on:
      - backend
